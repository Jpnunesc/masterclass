name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Angular web (lint / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check design tokens (no raw hex in feature libs)
        run: npm run check:no-hex

      - name: Check i18n (EN/PT parity + no hard-coded strings)
        run: npm run check:i18n

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
