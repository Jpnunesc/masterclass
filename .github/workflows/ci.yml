name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Angular web (lint / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome for Testing
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Lint
        run: npm run lint

      - name: Check design tokens (no raw hex in feature libs)
        run: npm run check:no-hex

      - name: Check i18n (EN/PT parity + no hard-coded strings)
        run: npm run check:i18n

      - name: Test (axe-core + keyboard-nav smoke + units)
        run: npm test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Build
        run: npm run build

  lighthouse:
    name: Lighthouse CI (a11y + perf budgets)
    needs: web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome for Testing
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lhci
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-results
          path: lhci-results
          if-no-files-found: ignore
